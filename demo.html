<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkedIn Redesign Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f1115;
        --card: #171a21;
        --line: #2a2f3a;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --brand: #0a66c2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Inter", "Segoe UI", Tahoma, sans-serif;
        background: radial-gradient(circle at top, #151922 0%, var(--bg) 60%);
        color: var(--text);
      }

      .card {
        width: min(92vw, 640px);
        border: 1px solid var(--line);
        background: var(--card);
        border-radius: 16px;
        padding: 28px;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: 30px;
      }

      p {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 16px;
      }

      .actions {
        margin-top: 22px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      a {
        height: 48px;
        border-radius: 12px;
        border: 1px solid var(--line);
        display: grid;
        place-items: center;
        color: #dbeafe;
        text-decoration: none;
        font-weight: 700;
        background: #11151d;
      }

      a.primary {
        border-color: #2f6fb2;
        background: rgba(10, 102, 194, 0.18);
      }

      .hint {
        margin-top: 16px;
        font-size: 13px;
      }

      @media (max-width: 640px) {
        h1 {
          font-size: 24px;
        }

        .actions {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>LinkedIn Redesign Prototype</h1>
      <p>Select a version to present in class.</p>

      <div class="actions">
          <a class="primary" href="v1-layout-demo.html">Open V1 — Feed-Like Layout</a>
          <a href="v2-layout-demo.html">Open V2 — Feed</a>
      </div>

      <p class="hint">Tip: Start with V1, then switch to V2 to explain the research-driven pivot.</p>
    </main>
  </body>
</html>
