<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Action Plan — LinkedIn V2</title>
  <link rel="stylesheet" href="v2-job-hub.css" />
</head>
<body class="v2-hub">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">in</div>
      <nav class="topbar-nav">
        <a class="nav-item" href="v2-job-hub.html">Back to V2 Job Hub</a>
      </nav>
    </div>
  </header>
  <main class="layout">
    <section class="center">
      <section class="card hero">
        <div style="background:#0a66c2;border-radius:8px;padding:18px 16px 12px 16px;color:#fff;position:relative;margin-bottom:18px;">
          <div style="height:4px;width:48px;background:#ffb800;border-radius:2px;margin-bottom:12px;"></div>
          <h1 style="font-size:2rem;font-weight:700;margin:0 0 8px 0;letter-spacing:-1px;">Action Plan</h1>
          <p style="font-size:1.1rem;margin:0;color:#fff;">Draft tailored replies, save recruiter posts, and schedule follow-ups directly into your application plan.</p>
        </div>
      </section>
      <section class="card">
        <h2 style="color:#0a66c2;font-size:1.2rem;font-weight:600;margin-bottom:8px;">Saved Recruiter Posts</h2>
        <form id="postForm" style="margin-bottom:12px;">
          <input type="text" id="postInput" placeholder="Add recruiter post..." style="width:80%;margin-right:8px;" />
          <button type="submit" class="landing-btn primary" style="font-size:1rem;font-weight:600;padding:8px 18px;margin-top:6px;">Save Post</button>
        </form>
        <ul id="savedPosts" class="landing-list"></ul>
      </section>
      <section class="card">
        <h2 style="color:#0a66c2;font-size:1.2rem;font-weight:600;margin-bottom:8px;">Draft Replies</h2>
        <form id="replyForm">
          <textarea id="replyInput" placeholder="Write your reply..." style="width:100%;height:80px;margin-bottom:12px;"></textarea>
          <button type="submit" class="landing-btn primary" style="font-size:1rem;font-weight:600;padding:8px 18px;margin-top:6px;">Save Reply</button>
        </form>
        <ul id="replyList" class="landing-list"></ul>
      </section>
      <section class="card">
        <h2 style="color:#0a66c2;font-size:1.2rem;font-weight:600;margin-bottom:8px;">Follow-Up Schedule</h2>
        <form id="followForm">
          <input type="text" id="followTitle" placeholder="Follow-up title" style="width:100%;margin-bottom:8px;" />
          <input type="date" id="followDate" style="width:100%;margin-bottom:8px;" />
          <button type="submit" class="landing-btn primary" style="font-size:1rem;font-weight:600;padding:8px 18px;margin-top:6px;">Add Follow-Up</button>
        </form>
        <ul id="followList" class="landing-list"></ul>
      </section>
    </section>
  </main>
  <script>
    // Persistent storage keys
    const POSTS_KEY = "actionPlanPosts";
    const REPLIES_KEY = "actionPlanReplies";
    const FOLLOWS_KEY = "actionPlanFollows";

    function load(key) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return [];
        return JSON.parse(raw);
      } catch {
        return [];
      }
    }
    function save(key, arr) {
      localStorage.setItem(key, JSON.stringify(arr));
    }

    function renderPosts() {
      const arr = load(POSTS_KEY);
      const root = document.getElementById("savedPosts");
      root.innerHTML = arr.length ? arr.map((v, i) => `<li>${v} <button onclick="removePost(${i})" class="landing-btn" style="padding:2px 8px;">Delete</button></li>`).join("") : "<li style='color:#888;'>No posts saved yet.</li>";
    }
    function renderReplies() {
      const arr = load(REPLIES_KEY);
      const root = document.getElementById("replyList");
      root.innerHTML = arr.length ? arr.map((v, i) => `<li>${v} <button onclick="removeReply(${i})" class="landing-btn" style="padding:2px 8px;">Delete</button></li>`).join("") : "<li style='color:#888;'>No replies drafted yet.</li>";
    }
    function renderFollows() {
      const arr = load(FOLLOWS_KEY);
      const root = document.getElementById("followList");
      root.innerHTML = arr.length ? arr.map((v, i) => `<li>${v.title} — ${v.date} <button onclick="removeFollow(${i})" class="landing-btn" style="padding:2px 8px;">Delete</button></li>`).join("") : "<li style='color:#888;'>No follow-ups scheduled yet.</li>";
    }
    window.removePost = function(idx) {
      const arr = load(POSTS_KEY);
      arr.splice(idx, 1);
      save(POSTS_KEY, arr);
      renderPosts();
    };
    window.removeReply = function(idx) {
      const arr = load(REPLIES_KEY);
      arr.splice(idx, 1);
      save(REPLIES_KEY, arr);
      renderReplies();
    };
    window.removeFollow = function(idx) {
      const arr = load(FOLLOWS_KEY);
      arr.splice(idx, 1);
      save(FOLLOWS_KEY, arr);
      renderFollows();
    };

    document.addEventListener("DOMContentLoaded", function() {
      renderPosts();
      renderReplies();
      renderFollows();
      document.getElementById("postForm").onsubmit = function(e) {
        e.preventDefault();
        const val = document.getElementById("postInput").value.trim();
        if (val) {
          const arr = load(POSTS_KEY);
          arr.push(val);
          save(POSTS_KEY, arr);
          renderPosts();
          document.getElementById("postInput").value = "";
        }
      };
      document.getElementById("replyForm").onsubmit = function(e) {
        e.preventDefault();
        const val = document.getElementById("replyInput").value.trim();
        if (val) {
          const arr = load(REPLIES_KEY);
          arr.push(val);
          save(REPLIES_KEY, arr);
          renderReplies();
          document.getElementById("replyInput").value = "";
        }
      };
      document.getElementById("followForm").onsubmit = function(e) {
        e.preventDefault();
        const title = document.getElementById("followTitle").value.trim();
        const date = document.getElementById("followDate").value;
        if (title && date) {
          const arr = load(FOLLOWS_KEY);
          arr.push({title, date});
          save(FOLLOWS_KEY, arr);
          renderFollows();
          document.getElementById("followTitle").value = "";
          document.getElementById("followDate").value = "";
        }
      };
    });
  </script>
</body>
</html>
