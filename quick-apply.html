<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Apply — LinkedIn Prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">in</div>
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input type="text" placeholder="Search jobs, companies, people" aria-label="Search" />
        </div>
        <nav class="topbar-nav" aria-label="Primary">
          <a class="nav-item active" href="index.html">Home</a>
          <a class="nav-item" href="v2-community.html">V2 Feed</a>
          <a class="nav-item" href="demo.html">Demo</a>
        </nav>
      </div>
    </header>

    <main class="landing-wrap">
      <section class="card landing-hero">
        <h1>Quick Apply</h1>
        <p>Submit an application faster with your saved profile, role-tailored resume, and prefilled responses.</p>
        <div class="landing-actions">
          <a class="landing-btn primary" href="index.html">Back to V1 Home</a>
          <a class="landing-btn" href="manage-board.html">Open Manage Board</a>
        </div>
      </section>

      <section class="landing-grid">
          <article class="card">
            <h2>Application Preview</h2>
            <ul class="landing-list" id="appPreview"></ul>
            <button id="editPreviewBtn" class="landing-btn">Edit Preview</button>
          </article>

          <article class="card">
            <h2>Ready to Submit</h2>
            <ul class="landing-list" id="readySubmit"></ul>
            <button id="editSubmitBtn" class="landing-btn">Edit Submit</button>
            <form id="quickApplyForm" style="margin-top:18px;">
             <label for="resumeUpload" style="font-weight:500;margin-bottom:8px;display:block;">Upload Resume:</label>
             <input type="file" id="resumeUpload" name="resumeUpload" accept=".pdf,.doc,.docx" style="margin-bottom:12px;">
             <button type="submit" class="landing-btn primary">Submit Application</button>
            </form>
            <div id="submitConfirmation" style="margin-top:12px;color:#228b22;font-weight:500;display:none;">Application submitted successfully!</div>
          </article>
      </section>
      <script>
                // Handle real resume submission
                document.addEventListener("DOMContentLoaded", function() {
                  const form = document.getElementById("quickApplyForm");
                  const confirmation = document.getElementById("submitConfirmation");
                  form.onsubmit = function(e) {
                    e.preventDefault();
                    confirmation.style.display = "block";
                    setTimeout(() => { confirmation.style.display = "none"; }, 2000);
                    form.reset();
                  };
                });
        // Persistent Quick Apply data using localStorage
        const QUICK_APPLY_KEY = "quickApplyData";
        const defaultData = {
          preview: {
            role: "Senior Product Designer",
            company: "LaunchGrid",
            location: "Toronto, ON · Hybrid",
            resume: "Product-Design-Portfolio-v3.pdf"
          },
          submit: {
            profileCompleteness: "96%",
            keywordMatch: "Strong",
            availability: "Immediate",
            estimatedTime: "2 minutes"
          }
        };

        function loadQuickApplyData() {
          try {
            const raw = localStorage.getItem(QUICK_APPLY_KEY);
            if (!raw) return {...defaultData};
            const parsed = JSON.parse(raw);
            return {
              preview: parsed.preview || defaultData.preview,
              submit: parsed.submit || defaultData.submit
            };
          } catch {
            return {...defaultData};
          }
        }

        function saveQuickApplyData(data) {
          localStorage.setItem(QUICK_APPLY_KEY, JSON.stringify(data));
        }

        function renderPreview(data) {
          const previewEl = document.getElementById("appPreview");
          previewEl.innerHTML = `
            <li>Role: ${data.role}</li>
            <li>Company: ${data.company}</li>
            <li>Location: ${data.location}</li>
            <li>Resume: ${data.resume}</li>
          `;
        }

        function renderSubmit(data) {
          const submitEl = document.getElementById("readySubmit");
          submitEl.innerHTML = `
            <li>Profile completeness: ${data.profileCompleteness}</li>
            <li>Keyword match: ${data.keywordMatch}</li>
            <li>Availability: ${data.availability}</li>
            <li>Estimated submission time: ${data.estimatedTime}</li>
          `;
        }

        function editPreview() {
          const data = loadQuickApplyData();
          const previewEl = document.getElementById("appPreview");
          previewEl.innerHTML = `
            <li>Role: <input type='text' value='${data.preview.role}' id='editRole' style='width:80%'/></li>
            <li>Company: <input type='text' value='${data.preview.company}' id='editCompany' style='width:80%'/></li>
            <li>Location: <input type='text' value='${data.preview.location}' id='editLocation' style='width:80%'/></li>
            <li>Resume: <input type='text' value='${data.preview.resume}' id='editResume' style='width:80%'/></li>
          `;
          Array.from(previewEl.querySelectorAll("input")).forEach(input => {
            input.onblur = function() {
              data.preview[input.id.replace("edit","").toLowerCase()] = input.value;
              saveQuickApplyData(data);
              renderQuickApply();
            };
          });
        }

        function editSubmit() {
          const data = loadQuickApplyData();
          const submitEl = document.getElementById("readySubmit");
          submitEl.innerHTML = `
            <li>Profile completeness: <input type='text' value='${data.submit.profileCompleteness}' id='editCompleteness' style='width:80%'/></li>
            <li>Keyword match: <input type='text' value='${data.submit.keywordMatch}' id='editKeyword' style='width:80%'/></li>
            <li>Availability: <input type='text' value='${data.submit.availability}' id='editAvailability' style='width:80%'/></li>
            <li>Estimated submission time: <input type='text' value='${data.submit.estimatedTime}' id='editTime' style='width:80%'/></li>
          `;
          Array.from(submitEl.querySelectorAll("input")).forEach(input => {
            input.onblur = function() {
              const keyMap = {
                editCompleteness: "profileCompleteness",
                editKeyword: "keywordMatch",
                editAvailability: "availability",
                editTime: "estimatedTime"
              };
              data.submit[keyMap[input.id]] = input.value;
              saveQuickApplyData(data);
              renderQuickApply();
            };
          });
        }

        function renderQuickApply() {
          const data = loadQuickApplyData();
          renderPreview(data.preview);
          renderSubmit(data.submit);
        }

        document.addEventListener("DOMContentLoaded", function() {
          renderQuickApply();
          document.getElementById("editPreviewBtn").onclick = editPreview;
          document.getElementById("editSubmitBtn").onclick = editSubmit;
        });
      </script>
    </main>
  </body>
</html>
